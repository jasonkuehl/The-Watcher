services:
  the-watcher:
    # Build from source (default):
    build: .
    # Or use the pre-built image from GHCR (comment out 'build' above and uncomment below):
    # image: ghcr.io/YOUR_GITHUB_USERNAME/the-watcher:latest
    container_name: the-watcher
    ports:
      - "3000:3000"
    # Required for ICMP ping to work inside the container
    cap_add:
      - NET_RAW
    restart: unless-stopped
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/summary"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
